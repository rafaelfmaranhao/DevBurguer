<div class="container">
    <div class="login">
        <div class="logo-container">
            <div class="burger logomarca" routerLink="/">🍔</div>
            <lucide-icon name="code" class="logomarca" routerLink="/"></lucide-icon>
        </div>
        <h1 class="animate__animated animate__fadeInLeftBig logomarca" routerLink="/"><app-logomarca></app-logomarca></h1>
        <p>Faça login para sincronizar com seu pedido</p>
        <form (ngSubmit)="login()">
            <div class="inputBox">
                <div>
                    <input type="email" [(ngModel)]="email" name="email" class="inputText" required>
                    <span>E-mail</span>
                    <hr>
                </div>
                <div>
                    <input type="password" [(ngModel)]="senha" name="senha" class="inputText" required>
                    <span>Senha</span>
                    <hr>
                </div>
                @if (mensagem) {
                    <p>{{ mensagem }}</p>
                }
            </div>
            <div class="buttonBox">
                <app-btn tipo="submit" valor="Entrar"></app-btn>
                <app-btn tipo="button" valor="Cadastrar-se" link="/cadastro"></app-btn>
            </div>
        </form>
    </div>
</div>
